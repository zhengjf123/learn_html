<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="祝骆珂微姐姐生日快乐" />
    <title>骆珂微，生日快乐</title>
    <style>
      :root {
        --rose: #ff6b9d;
        --peach: #ffc4a3;
        --lilac: #c4b5fd;
        --gold: #fbbf24;
        --cream: #fff7f0;
        --ink: #3d2c3a;
        --ink-soft: rgba(61, 44, 58, 0.72);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", ui-sans-serif,
          system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(ellipse 120% 80% at 50% -20%, #ffe8f0 0%, transparent 55%),
          radial-gradient(ellipse 90% 60% at 100% 30%, rgba(196, 181, 253, 0.45) 0%, transparent 50%),
          radial-gradient(ellipse 80% 50% at 0% 80%, rgba(255, 196, 163, 0.5) 0%, transparent 45%),
          linear-gradient(165deg, #fff5f8 0%, #ffeef5 35%, #fdf2ff 100%);
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1.25rem, 4vw, 2.5rem);
      }

      #confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: min(520px, 100%);
        text-align: center;
      }

      .balloons {
        display: flex;
        justify-content: center;
        gap: clamp(0.75rem, 4vw, 1.5rem);
        margin-bottom: 0.5rem;
        height: clamp(100px, 22vw, 140px);
      }

      .balloon {
        width: clamp(52px, 14vw, 72px);
        height: clamp(68px, 18vw, 92px);
        border-radius: 50% 50% 48% 48%;
        position: relative;
        transform-origin: 50% 100%;
        animation: sway 3.2s ease-in-out infinite;
        box-shadow: inset -8px -12px 0 rgba(0, 0, 0, 0.06);
      }

      .balloon::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -6px;
        width: 2px;
        height: clamp(48px, 12vw, 72px);
        background: linear-gradient(
          to bottom,
          rgba(61, 44, 58, 0.35),
          rgba(61, 44, 58, 0.08)
        );
        transform: translateX(-50%);
      }

      .balloon:nth-child(1) {
        background: linear-gradient(145deg, #ff8fab, var(--rose));
        animation-delay: 0s;
      }
      .balloon:nth-child(2) {
        background: linear-gradient(145deg, #fde68a, var(--gold));
        animation-delay: 0.4s;
      }
      .balloon:nth-child(3) {
        background: linear-gradient(145deg, #ddd6fe, #a78bfa);
        animation-delay: 0.8s;
      }

      @keyframes sway {
        0%,
        100% {
          transform: rotate(-4deg) translateY(0);
        }
        50% {
          transform: rotate(5deg) translateY(-6px);
        }
      }

      .card {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.95);
        border-radius: 24px;
        padding: clamp(1.75rem, 5vw, 2.5rem) clamp(1.5rem, 4vw, 2rem);
        box-shadow: 0 24px 60px rgba(255, 107, 157, 0.12), 0 8px 24px rgba(61, 44, 58, 0.06);
      }

      .eyebrow {
        font-size: 0.95rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--rose);
        font-weight: 600;
        margin: 0 0 0.75rem;
        opacity: 0.9;
      }

      .hero-name {
        margin: 0 0 0.2rem;
        font-size: clamp(1.5rem, 5vw, 2rem);
        font-weight: 800;
        letter-spacing: 0.2em;
        color: var(--ink);
      }

      h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(2.25rem, 8vw, 3.25rem);
        font-weight: 800;
        letter-spacing: 0.08em;
        line-height: 1.15;
        background: linear-gradient(120deg, var(--rose), #f472b6 40%, var(--gold));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 2px 16px rgba(255, 107, 157, 0.25));
      }

      .sub {
        margin: 0 0 1.5rem;
        font-size: clamp(1.05rem, 3.5vw, 1.2rem);
        color: var(--ink-soft);
        line-height: 1.75;
      }

      .sub strong {
        color: var(--ink);
        font-weight: 700;
      }

      .wish {
        margin: 0;
        padding: 1.15rem 1rem;
        background: linear-gradient(135deg, rgba(255, 247, 240, 0.9), rgba(255, 255, 255, 0.6));
        border-radius: 16px;
        border: 1px solid rgba(255, 182, 193, 0.35);
        font-size: clamp(0.98rem, 2.8vw, 1.05rem);
        line-height: 1.85;
        color: var(--ink-soft);
      }

      .sign {
        margin: 1.35rem 0 0;
        font-size: 0.95rem;
        color: var(--ink-soft);
        font-style: italic;
      }

      .cake {
        margin-top: 1.5rem;
        font-size: clamp(2.5rem, 8vw, 3rem);
        line-height: 1;
        filter: drop-shadow(0 4px 12px rgba(251, 191, 36, 0.35));
        animation: bounce 2.4s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        border-radius: 24px;
      }

      .sparkles span {
        position: absolute;
        width: 6px;
        height: 6px;
        background: var(--gold);
        border-radius: 50%;
        opacity: 0;
        animation: twinkle 2.8s ease-in-out infinite;
      }

      .sparkles span:nth-child(1) {
        top: 12%;
        left: 8%;
        animation-delay: 0s;
      }
      .sparkles span:nth-child(2) {
        top: 22%;
        right: 12%;
        animation-delay: 0.6s;
        background: var(--rose);
      }
      .sparkles span:nth-child(3) {
        bottom: 28%;
        left: 14%;
        animation-delay: 1.2s;
        background: var(--lilac);
      }
      .sparkles span:nth-child(4) {
        bottom: 18%;
        right: 10%;
        animation-delay: 1.8s;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.6);
        }
        40%,
        60% {
          opacity: 0.85;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .balloon,
        .cake,
        .sparkles span {
          animation: none;
        }
        .balloon {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="confetti" aria-hidden="true"></canvas>

    <div class="wrap">
      <div class="balloons" aria-hidden="true">
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
      </div>

      <div class="card">
        <div class="sparkles" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <p class="eyebrow">HAPPY BIRTHDAY</p>
        <p class="hero-name">骆珂微</p>
        <h1>生日快乐</h1>
        <p class="sub">姐姐，愿你被温柔环绕，笑容比烛光更亮。</p>
        <p class="wish">
          骆珂微，新的一岁里，健康平安常伴，心想的事慢慢都实现；累了就休息，开心就大笑。今天只管做最耀眼的主角，生日这天，全世界都该围着你转一圈。
        </p>
        <p class="sign">—— 爱你的家人</p>
        <div class="cake" aria-hidden="true">🎂</div>
      </div>
    </div>

    <script>
      (function () {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

        var canvas = document.getElementById("confetti");
        var ctx = canvas.getContext("2d");
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var pieces = [];
        var colors = ["#ff6b9d", "#fbbf24", "#c4b5fd", "#f472b6", "#34d399", "#60a5fa"];

        function resize() {
          canvas.width = Math.floor(window.innerWidth * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function spawn(n) {
          var w = window.innerWidth;
          var h = window.innerHeight;
          for (var i = 0; i < n; i++) {
            pieces.push({
              x: Math.random() * w,
              y: -20 - Math.random() * h * 0.3,
              w: 6 + Math.random() * 6,
              h: 8 + Math.random() * 8,
              vy: 1.5 + Math.random() * 3,
              vx: -1 + Math.random() * 2,
              rot: Math.random() * Math.PI,
              vr: -0.15 + Math.random() * 0.3,
              c: colors[(Math.random() * colors.length) | 0],
            });
          }
        }

        function tick() {
          var w = window.innerWidth;
          var h = window.innerHeight;
          ctx.clearRect(0, 0, w, h);
          for (var i = 0; i < pieces.length; i++) {
            var p = pieces[i];
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.c;
            ctx.globalAlpha = 0.85;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
            if (p.y > h + 40) {
              p.y = -30;
              p.x = Math.random() * w;
            }
          }
          requestAnimationFrame(tick);
        }

        resize();
        window.addEventListener("resize", resize);
        spawn(55);
        setTimeout(function () {
          spawn(35);
        }, 1800);
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>

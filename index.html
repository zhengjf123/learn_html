<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="祝骆珂微姐姐生日快乐" />
    <title>骆珂微，生日快乐</title>
    <style>
      :root {
        --rose: #ff6b9d;
        --rose-deep: #e11d6a;
        --peach: #ffc4a3;
        --lilac: #c4b5fd;
        --gold: #fbbf24;
        --ink: #3d2c3a;
        --ink-soft: rgba(61, 44, 58, 0.72);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", ui-sans-serif,
          system-ui, sans-serif;
        color: var(--ink);
        background: #1a0a14;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1.25rem, 4vw, 2.5rem);
      }

      .ambient {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .ambient .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(72px);
        opacity: 0.55;
        mix-blend-mode: screen;
        animation: blobDrift 18s ease-in-out infinite alternate;
      }

      .ambient .blob.b1 {
        width: min(90vw, 520px);
        height: min(90vw, 520px);
        background: radial-gradient(circle, rgba(255, 107, 157, 0.9) 0%, transparent 70%);
        left: -15%;
        top: -10%;
        animation-duration: 22s;
      }

      .ambient .blob.b2 {
        width: min(80vw, 480px);
        height: min(80vw, 480px);
        background: radial-gradient(circle, rgba(196, 181, 253, 0.85) 0%, transparent 70%);
        right: -20%;
        top: 15%;
        animation-duration: 26s;
        animation-delay: -4s;
      }

      .ambient .blob.b3 {
        width: min(100vw, 600px);
        height: min(100vw, 600px);
        background: radial-gradient(circle, rgba(251, 191, 36, 0.45) 0%, transparent 65%);
        left: 10%;
        bottom: -25%;
        animation-duration: 20s;
        animation-delay: -8s;
      }

      .ambient .blob.b4 {
        width: min(70vw, 400px);
        height: min(70vw, 400px);
        background: radial-gradient(circle, rgba(244, 114, 182, 0.65) 0%, transparent 70%);
        right: 5%;
        bottom: 5%;
        animation-duration: 24s;
        animation-delay: -12s;
      }

      @keyframes blobDrift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(6%, 8%) scale(1.12);
        }
      }

      .ambient .grain {
        position: absolute;
        inset: 0;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      .ambient .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 60% at 50% 45%, transparent 0%, rgba(26, 10, 20, 0.55) 100%);
      }

      #fx {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }

      .wrap {
        position: relative;
        z-index: 2;
        width: min(540px, 100%);
        text-align: center;
        transform-style: preserve-3d;
        transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .balloons {
        display: flex;
        justify-content: center;
        gap: clamp(0.75rem, 4vw, 1.5rem);
        margin-bottom: 0.5rem;
        height: clamp(100px, 22vw, 140px);
        filter: drop-shadow(0 12px 24px rgba(255, 107, 157, 0.25));
      }

      .balloon {
        width: clamp(52px, 14vw, 72px);
        height: clamp(68px, 18vw, 92px);
        border-radius: 50% 50% 48% 48%;
        position: relative;
        transform-origin: 50% 100%;
        animation: sway 3.2s ease-in-out infinite;
        box-shadow: inset -10px -14px 0 rgba(0, 0, 0, 0.08), 0 0 20px rgba(255, 255, 255, 0.15);
      }

      .balloon::before {
        content: "";
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.35);
        top: 18%;
        left: 22%;
      }

      .balloon::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -6px;
        width: 2px;
        height: clamp(48px, 12vw, 72px);
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.25),
          rgba(61, 44, 58, 0.2)
        );
        transform: translateX(-50%);
      }

      .balloon:nth-child(1) {
        background: linear-gradient(145deg, #ff8fab, var(--rose));
        animation-delay: 0s;
      }
      .balloon:nth-child(2) {
        background: linear-gradient(145deg, #fde68a, var(--gold));
        animation-delay: 0.4s;
      }
      .balloon:nth-child(3) {
        background: linear-gradient(145deg, #ddd6fe, #a78bfa);
        animation-delay: 0.8s;
      }

      @keyframes sway {
        0%,
        100% {
          transform: rotate(-5deg) translateY(0);
        }
        50% {
          transform: rotate(6deg) translateY(-10px);
        }
      }

      .card {
        position: relative;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.82) 0%,
          rgba(255, 250, 252, 0.72) 50%,
          rgba(255, 245, 250, 0.78) 100%
        );
        backdrop-filter: blur(20px) saturate(1.2);
        -webkit-backdrop-filter: blur(20px) saturate(1.2);
        border-radius: 26px;
        padding: clamp(1.85rem, 5vw, 2.65rem) clamp(1.5rem, 4vw, 2rem);
        box-shadow: 0 4px 3px rgba(255, 182, 193, 0.15) inset, 0 32px 64px rgba(255, 107, 157, 0.18),
          0 12px 40px rgba(61, 44, 58, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.65) inset;
        animation: cardGlow 5s ease-in-out infinite alternate;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 29px;
        z-index: -1;
        background: linear-gradient(
          125deg,
          var(--rose),
          #f472b6,
          var(--lilac),
          var(--gold),
          #fda4af,
          var(--rose)
        );
        background-size: 400% 400%;
        animation: borderFlow 10s ease infinite;
        opacity: 0.85;
        filter: blur(6px);
      }

      @keyframes borderFlow {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      @keyframes cardGlow {
        0% {
          box-shadow: 0 4px 3px rgba(255, 182, 193, 0.15) inset, 0 32px 64px rgba(255, 107, 157, 0.16),
            0 12px 40px rgba(61, 44, 58, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.65) inset;
        }
        100% {
          box-shadow: 0 4px 3px rgba(255, 182, 193, 0.2) inset, 0 36px 72px rgba(196, 181, 253, 0.22),
            0 16px 48px rgba(255, 107, 157, 0.14), 0 0 0 1px rgba(255, 255, 255, 0.7) inset;
        }
      }

      .eyebrow {
        font-size: 0.88rem;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        background: linear-gradient(90deg, var(--rose-deep), var(--rose), var(--gold));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 700;
        margin: 0 0 0.65rem;
        animation: eyebrowShine 6s linear infinite;
        background-size: 200% auto;
      }

      @keyframes eyebrowShine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      .hero-name {
        margin: 0 0 0.15rem;
        font-size: clamp(1.55rem, 5vw, 2.1rem);
        font-weight: 800;
        letter-spacing: 0.22em;
        background: linear-gradient(135deg, var(--ink) 0%, #6b4a5c 50%, var(--rose-deep) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 18px rgba(255, 107, 157, 0.35));
        animation: namePulse 4s ease-in-out infinite;
      }

      @keyframes namePulse {
        0%,
        100% {
          filter: drop-shadow(0 0 14px rgba(255, 107, 157, 0.3));
        }
        50% {
          filter: drop-shadow(0 0 28px rgba(196, 181, 253, 0.55)) drop-shadow(0 0 12px rgba(251, 191, 36, 0.35));
        }
      }

      h1 {
        margin: 0 0 0.4rem;
        font-size: clamp(2.35rem, 8vw, 3.45rem);
        font-weight: 800;
        letter-spacing: 0.12em;
        line-height: 1.12;
        background: linear-gradient(
          110deg,
          var(--rose-deep),
          var(--rose) 25%,
          #f9a8d4 45%,
          var(--gold) 65%,
          var(--lilac) 85%,
          var(--rose)
        );
        background-size: 220% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: titleFlow 7s ease-in-out infinite;
        filter: drop-shadow(0 3px 20px rgba(255, 107, 157, 0.45));
      }

      @keyframes titleFlow {
        0%,
        100% {
          background-position: 0% center;
        }
        50% {
          background-position: 100% center;
        }
      }

      .sub {
        margin: 0 0 1.45rem;
        font-size: clamp(1.05rem, 3.5vw, 1.2rem);
        color: var(--ink-soft);
        line-height: 1.75;
      }

      .wish {
        margin: 0;
        padding: 1.2rem 1.1rem;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.55),
          rgba(255, 240, 248, 0.5),
          rgba(250, 245, 255, 0.45)
        );
        border-radius: 18px;
        border: 1px solid rgba(255, 182, 193, 0.45);
        font-size: clamp(0.98rem, 2.8vw, 1.05rem);
        line-height: 1.88;
        color: var(--ink-soft);
        box-shadow: 0 8px 32px rgba(255, 107, 157, 0.08) inset;
      }

      .sign {
        margin: 1.35rem 0 0;
        font-size: 0.95rem;
        color: var(--ink-soft);
        font-style: italic;
      }

      .cake {
        margin-top: 1.45rem;
        font-size: clamp(2.6rem, 8vw, 3.2rem);
        line-height: 1;
        filter: drop-shadow(0 6px 16px rgba(251, 191, 36, 0.45));
        animation: cakeBob 2.2s ease-in-out infinite;
      }

      @keyframes cakeBob {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-8px) scale(1.04);
        }
      }

      .sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        border-radius: 26px;
      }

      .sparkles span {
        position: absolute;
        width: 7px;
        height: 7px;
        background: var(--gold);
        border-radius: 50%;
        opacity: 0;
        box-shadow: 0 0 10px var(--gold);
        animation: twinkle 2.6s ease-in-out infinite;
      }

      .sparkles span:nth-child(1) {
        top: 10%;
        left: 7%;
        animation-delay: 0s;
      }
      .sparkles span:nth-child(2) {
        top: 18%;
        right: 10%;
        animation-delay: 0.5s;
        background: var(--rose);
        box-shadow: 0 0 10px var(--rose);
      }
      .sparkles span:nth-child(3) {
        bottom: 32%;
        left: 12%;
        animation-delay: 1s;
        background: var(--lilac);
        box-shadow: 0 0 10px var(--lilac);
      }
      .sparkles span:nth-child(4) {
        bottom: 14%;
        right: 8%;
        animation-delay: 1.5s;
      }
      .sparkles span:nth-child(5) {
        top: 48%;
        right: 5%;
        animation-delay: 0.3s;
        width: 5px;
        height: 5px;
        background: #fff;
      }
      .sparkles span:nth-child(6) {
        top: 62%;
        left: 6%;
        animation-delay: 1.2s;
        width: 5px;
        height: 5px;
        background: #fda4af;
        box-shadow: 0 0 8px #fda4af;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.5) rotate(0deg);
        }
        45%,
        55% {
          opacity: 1;
          transform: scale(1.1) rotate(180deg);
        }
      }

      .hint-tap {
        margin-top: 1rem;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.45);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
      }

      @media (prefers-reduced-motion: reduce) {
        .hint-tap {
          display: none;
        }
        .ambient .blob,
        .eyebrow,
        .hero-name,
        h1,
        .card,
        .card::before,
        .balloon,
        .cake,
        .sparkles span {
          animation: none;
        }
        .eyebrow,
        .hero-name,
        h1 {
          background-position: 50% center;
        }
        .balloon {
          transform: none;
        }
        .wrap {
          transform: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
      <div class="grain"></div>
      <div class="vignette"></div>
    </div>

    <canvas id="fx" aria-hidden="true"></canvas>

    <div class="wrap" id="parallax">
      <div class="balloons" aria-hidden="true">
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
      </div>

      <div class="card" id="card">
        <div class="sparkles" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="eyebrow">HAPPY BIRTHDAY</p>
        <p class="hero-name">骆珂微</p>
        <h1>生日快乐</h1>
        <p class="sub">姐姐，愿你被温柔环绕，笑容比烛光更亮。</p>
        <p class="wish">
          骆珂微，新的一岁里，健康平安常伴，心想的事慢慢都实现；累了就休息，开心就大笑。今天只管做最耀眼的主角，生日这天，全世界都该围着你转一圈。
        </p>
        <p class="sign">—— 爱你的家人</p>
        <div class="cake" aria-hidden="true">🎂</div>
      </div>

      <p class="hint-tap">点击屏幕任意处 · 再绽放一次礼花</p>
    </div>

    <script>
      (function () {
        var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var canvas = document.getElementById("fx");
        var ctx = canvas.getContext("2d");
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var W = 0;
        var H = 0;

        var stars = [];
        var hearts = [];
        var petals = [];
        var confetti = [];
        var bursts = [];

        var colors = ["#ff6b9d", "#f472b6", "#fbbf24", "#c4b5fd", "#a78bfa", "#fda4af", "#fb7185"];
        var petalColors = ["rgba(255,182,193,0.65)", "rgba(244,114,182,0.5)", "rgba(253,164,175,0.55)"];

        function resize() {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = Math.floor(W * dpr);
          canvas.height = Math.floor(H * dpr);
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function initStars(n) {
          stars.length = 0;
          for (var i = 0; i < n; i++) {
            stars.push({
              x: Math.random() * W,
              y: Math.random() * H,
              r: Math.random() * 1.6 + 0.3,
              tw: Math.random() * Math.PI * 2,
              sp: 0.4 + Math.random() * 1.2,
            });
          }
        }

        function spawnHeart() {
          hearts.push({
            x: Math.random() * W,
            y: H + 20,
            s: 0.35 + Math.random() * 0.55,
            vx: -0.35 + Math.random() * 0.7,
            vy: -(0.4 + Math.random() * 0.9),
            rot: Math.random() * Math.PI * 2,
            vr: -0.008 + Math.random() * 0.016,
            a: 0.15 + Math.random() * 0.35,
            c: Math.random() > 0.5 ? "#ff6b9d" : "#f9a8d4",
          });
        }

        function spawnPetal() {
          petals.push({
            x: Math.random() * W,
            y: -15,
            r: 3 + Math.random() * 5,
            vx: -0.6 + Math.random() * 1.2,
            vy: 0.6 + Math.random() * 1.4,
            rot: Math.random() * Math.PI,
            vr: -0.04 + Math.random() * 0.08,
            c: petalColors[(Math.random() * petalColors.length) | 0],
          });
        }

        function spawnConfettiFall(n) {
          for (var i = 0; i < n; i++) {
            confetti.push({
              x: Math.random() * W,
              y: -20 - Math.random() * H * 0.4,
              w: 5 + Math.random() * 7,
              h: 6 + Math.random() * 9,
              vx: -1.2 + Math.random() * 2.4,
              vy: 1.2 + Math.random() * 3.2,
              rot: Math.random() * Math.PI,
              vr: -0.2 + Math.random() * 0.4,
              c: colors[(Math.random() * colors.length) | 0],
              type: Math.random() > 0.35 ? 0 : 1,
            });
          }
        }

        function burstAt(x, y, count) {
          for (var i = 0; i < count; i++) {
            var ang = Math.random() * Math.PI * 2;
            var sp = 3 + Math.random() * 9;
            bursts.push({
              x: x,
              y: y,
              vx: Math.cos(ang) * sp,
              vy: Math.sin(ang) * sp - 2,
              life: 1,
              w: 4 + Math.random() * 6,
              h: 5 + Math.random() * 8,
              rot: Math.random() * Math.PI,
              vr: -0.35 + Math.random() * 0.7,
              c: colors[(Math.random() * colors.length) | 0],
              g: 0.12 + Math.random() * 0.08,
            });
          }
          for (var j = 0; j < Math.floor(count * 0.35); j++) {
            var a = Math.random() * Math.PI * 2;
            var s = 2 + Math.random() * 5;
            bursts.push({
              x: x,
              y: y,
              vx: Math.cos(a) * s,
              vy: Math.sin(a) * s - 3,
              life: 1,
              heart: true,
              s: 0.25 + Math.random() * 0.35,
              rot: Math.random() * Math.PI * 2,
              vr: -0.1 + Math.random() * 0.2,
              c: "#ff6b9d",
              g: 0.06,
            });
          }
        }

        function fillHeart(x, y, scale, rotation, color, alpha) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rotation);
          ctx.scale(scale, scale);
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.moveTo(0, 10);
          ctx.bezierCurveTo(0, 4, -12, 0, -12, 10);
          ctx.bezierCurveTo(-12, 20, 0, 28, 0, 36);
          ctx.bezierCurveTo(0, 28, 12, 20, 12, 10);
          ctx.bezierCurveTo(12, 0, 0, 4, 0, 10);
          ctx.closePath();
          var g = ctx.createRadialGradient(0, 12, 0, 0, 14, 22);
          g.addColorStop(0, "#fff5f7");
          g.addColorStop(0.35, color);
          g.addColorStop(1, color);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.restore();
        }

        var t = 0;
        function tick() {
          t += 0.016;
          ctx.clearRect(0, 0, W, H);

          for (var si = 0; si < stars.length; si++) {
            var st = stars[si];
            var tw = 0.35 + Math.sin(t * st.sp + st.tw) * 0.65;
            ctx.fillStyle = "rgba(255,255,255," + (0.15 + tw * 0.55) + ")";
            ctx.beginPath();
            ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
            ctx.fill();
          }

          for (var hi = hearts.length - 1; hi >= 0; hi--) {
            var h = hearts[hi];
            h.x += h.vx;
            h.y += h.vy;
            h.rot += h.vr;
            fillHeart(h.x, h.y, h.s * 18, h.rot, h.c, h.a);
            if (h.y < -60) hearts.splice(hi, 1);
          }

          for (var pi = petals.length - 1; pi >= 0; pi--) {
            var pe = petals[pi];
            pe.x += pe.vx + Math.sin(t + pi) * 0.15;
            pe.y += pe.vy;
            pe.rot += pe.vr;
            ctx.save();
            ctx.translate(pe.x, pe.y);
            ctx.rotate(pe.rot);
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = pe.c;
            ctx.beginPath();
            ctx.ellipse(0, 0, pe.r, pe.r * 0.55, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            if (pe.y > H + 30) petals.splice(pi, 1);
          }

          for (var ci = confetti.length - 1; ci >= 0; ci--) {
            var c = confetti[ci];
            c.x += c.vx;
            c.y += c.vy;
            c.rot += c.vr;
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rot);
            ctx.globalAlpha = 0.88;
            if (c.type === 0) {
              ctx.fillStyle = c.c;
              ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
            } else {
              ctx.strokeStyle = c.c;
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(-c.w, 0);
              ctx.lineTo(c.w, 0);
              ctx.stroke();
            }
            ctx.restore();
            if (c.y > H + 40) {
              c.y = -25;
              c.x = Math.random() * W;
            }
          }

          for (var bi = bursts.length - 1; bi >= 0; bi--) {
            var b = bursts[bi];
            b.x += b.vx;
            b.y += b.vy;
            b.vy += b.g;
            b.life -= 0.014;
            b.rot += b.vr;
            if (b.heart) {
              fillHeart(b.x, b.y, b.s * 18, b.rot, b.c, Math.max(0, b.life) * 0.9);
            } else {
              ctx.save();
              ctx.translate(b.x, b.y);
              ctx.rotate(b.rot);
              ctx.globalAlpha = Math.max(0, b.life);
              ctx.fillStyle = b.c;
              ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
              ctx.restore();
            }
            if (b.life <= 0) bursts.splice(bi, 1);
          }

          requestAnimationFrame(tick);
        }

        function onResize() {
          resize();
          initStars(W < 600 ? 55 : 95);
        }

        if (!reduce) {
          onResize();
          window.addEventListener("resize", onResize);

          spawnConfettiFall(W < 600 ? 42 : 72);
          setTimeout(function () {
            spawnConfettiFall(W < 600 ? 28 : 48);
          }, 1600);
          burstAt(W * 0.5, H * 0.28, W < 600 ? 55 : 85);

          setInterval(function () {
            if (Math.random() > 0.55) spawnHeart();
          }, 900);
          setInterval(function () {
            if (Math.random() > 0.4) spawnPetal();
          }, 500);

          setInterval(function () {
            burstAt(Math.random() * W * 0.7 + W * 0.15, Math.random() * H * 0.35 + H * 0.08, W < 600 ? 28 : 42);
          }, 5200);

          requestAnimationFrame(tick);

          document.addEventListener(
            "click",
            function (e) {
              if (e.target.closest && e.target.closest("a")) return;
              burstAt(e.clientX, e.clientY, W < 600 ? 48 : 72);
            },
            { passive: true }
          );

          var par = document.getElementById("parallax");
          var mqFine = window.matchMedia("(pointer: fine)");
          if (mqFine.matches) {
            document.addEventListener(
              "mousemove",
              function (e) {
                var cx = W / 2;
                var cy = H / 2;
                var dx = (e.clientX - cx) / cx;
                var dy = (e.clientY - cy) / cy;
                par.style.transform =
                  "perspective(1000px) rotateY(" + (dx * 7).toFixed(2) + "deg) rotateX(" + (-dy * 5).toFixed(2) + "deg)";
              },
              { passive: true }
            );
          }
        } else {
          resize();
        }
      })();
    </script>
  </body>
</html>

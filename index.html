<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="祝骆珂微姐姐生日快乐" />
    <title>骆珂微，生日快乐</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preload" href="audio/bgm.mp3" as="audio" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
      <div class="grain"></div>
      <div class="vignette"></div>
    </div>

    <canvas id="fx" aria-hidden="true"></canvas>

    <div class="desktop-cinema desktop-cinema--back" aria-hidden="true">
      <div class="desktop-cinema__grain"></div>
      <div class="desktop-cinema__glow"></div>
      <div class="desktop-cinema__vignette"></div>
    </div>
    <div class="desktop-cinema desktop-cinema--front" aria-hidden="true">
      <div class="desktop-cinema__letterbox desktop-cinema__letterbox--top"></div>
      <div class="desktop-cinema__letterbox desktop-cinema__letterbox--bottom"></div>
    </div>

    <audio id="bgm-audio" loop playsinline preload="auto">
      <source src="audio/bgm.mp3" type="audio/mpeg" />
    </audio>

    <button
      type="button"
      class="bgm-float no-fx-burst"
      id="bgm-float"
      aria-pressed="true"
      aria-label="关闭背景音乐"
      title="背景音乐"
    >
      <svg class="bgm-float__icon bgm-float__icon--on" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="currentColor"
          d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
        />
      </svg>
      <svg class="bgm-float__icon bgm-float__icon--off" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="currentColor"
          d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.96-.98 1.55-2.32 1.55-3.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
        />
      </svg>
    </button>

    <header class="hero-screen">
      <div class="wrap" id="hero-parallax">
        <div class="balloons" aria-hidden="true">
          <div class="balloon"></div>
          <div class="balloon"></div>
          <div class="balloon"></div>
        </div>

        <div class="card" id="card">
          <div class="sparkles" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
          <p class="eyebrow">HAPPY BIRTHDAY</p>
          <p class="hero-name">骆珂微</p>
          <h1>生日快乐</h1>
          <p class="sub">姐姐，愿你被温柔环绕，笑容比烛光更亮。</p>
          <p class="wish">
            骆珂微，新的一岁里，健康平安常伴，心想的事慢慢都实现；累了就休息，开心就大笑。今天只管做最耀眼的主角，生日这天，全世界都该围着你转一圈。
          </p>
          <p class="sign">—— 爱你的家人</p>
          <div class="cake" aria-hidden="true">🎂</div>
        </div>

        <p class="hint-tap">点击空白处 · 礼花绽放</p>
        <a class="to-gallery" href="#gallery">下滑开启 · 时光放映 ✦</a>
      </div>
    </header>

    <section class="gallery-section no-fx-burst" id="gallery" aria-labelledby="gallery-title">
      <div class="gallery-inner">
        <header class="gallery-header">
          <h2 id="gallery-title">时光放映</h2>
        </header>

        <div
          class="slideshow no-fx-burst"
          id="slideshow"
          tabindex="0"
          role="region"
          aria-roledescription="carousel"
          aria-label="骆珂微的照片放映"
        >
          <div class="slide-frame">
            <div class="slide-layer is-visible">
              <img alt="" decoding="async" />
            </div>
            <div class="slide-layer">
              <img alt="" decoding="async" />
            </div>
            <div class="slide-shine" aria-hidden="true"></div>
          </div>
          <p class="slide-caption"></p>
          <div class="slide-toolbar">
            <button type="button" class="btn-prev" aria-label="上一张">‹</button>
            <button type="button" class="btn-play" aria-label="暂停自动放映">⏸</button>
            <button type="button" class="btn-next" aria-label="下一张">›</button>
            <button type="button" class="btn-fullscreen">全屏放映</button>
          </div>
          <div class="slide-progress" aria-hidden="true">
            <span class="slide-progress-fill"></span>
          </div>
          <div class="filmstrip" id="filmstrip"></div>
        </div>

        <div class="gallery-empty" id="gallery-empty" hidden>
          <p><strong>还没有登记照片</strong></p>
          <p>
            请将图片放入 <code>photos/</code> 文件夹，并编辑 <code>photos/manifest.json</code> 中的
            <code>photos</code> 列表。
          </p>
          <p>完整步骤见仓库根目录的 <code>PHOTOS_USAGE.txt</code>。</p>
        </div>
      </div>
    </section>

    <script src="js/gallery.js"></script>
    <script src="js/bgm.js"></script>
    <script src="js/fx.js"></script>
  </body>
</html>
